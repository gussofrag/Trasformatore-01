<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Trasformatore 01</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #f4f4f4;
    }

    /* Contenitore mappa */
    .map-container {
      position: relative;
      width: 100%;
      max-width: 100%;
      height: auto;
      overflow: hidden;
    }

    .map-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Marker standardizzati */
    .marker {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      border: 2px solid #fff;
      box-shadow: 0 0 4px rgba(0,0,0,0.5);
      transition: transform 0.15s ease;
      user-select: none;
    }

    .marker:hover {
      transform: translate(-50%, -50%) scale(1.25);
      z-index: 20;
    }

    .verde { background: #00cc44; }
    .celestino { background: #66ccff; }

    /* Marker selezionato */
    .selected {
      transform: translate(-50%, -50%) scale(1.6) !important;
      border: 3px solid yellow !important;
      z-index: 30;
    }

    /* Tooltip semplice */
    .tooltip {
      position: absolute;
      padding: 6px 10px;
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border-radius: 4px;
      white-space: nowrap;
      transform: translate(-50%, -130%);
      pointer-events: none;
      display: none;
      z-index: 40;
    }

    /* Tooltip menu a 2 voci */
    .tooltip-menu {
      position: absolute;
      background: rgba(0,0,0,0.90);
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      display: none;
      z-index: 50;
      transform: translate(-50%, -10px);
    }

    .tooltip-menu div {
      padding: 6px 0;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .tooltip-menu div:last-child {
      border-bottom: none;
    }

    .tooltip-menu div:hover {
      color: yellow;
    }

    /* Pulsante Home */
    .home-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #ffffff;
      border: 2px solid #333;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(0,0,0,0.3);
      z-index: 50;
    }
  </style>
</head>
